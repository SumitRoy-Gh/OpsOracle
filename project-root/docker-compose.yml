version: "3.9"

services:

  # Main backend — always running
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pr-sentinel-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./private-key.pem:/app/private-key.pem:ro
    env_file:
      - .env
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # CLI service — run on demand, not always-on
  # Usage: docker-compose run --rm cli scan main.tf
  #        docker-compose run --rm cli logs app.log
  #        docker-compose run --rm cli chat
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pr-sentinel-cli
    volumes:
      - .:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # Point CLI at the backend service by container name
      PR_SENTINEL_SERVER: http://backend:8000
    entrypoint: ["python", "cli.py"]
    # No ports needed — CLI only
    profiles:
      - cli
    depends_on:
      - backend