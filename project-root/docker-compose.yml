version: "3.9"

services:

  # Main backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opsoracle-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      # IMPORTANT: private-key.pem must exist before running docker-compose up
      # Create a dummy file if you don't have one yet:
      # touch private-key.pem
      - ./private-key.pem:/app/private-key.pem:ro
    env_file:
      - .env
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Ngrok tunnel — exposes backend to GitHub webhooks
  ngrok:
    image: ngrok/ngrok:latest
    container_name: opsoracle-ngrok
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: >
      http backend:8000 --log=stdout
    ports:
      - "4040:4040"

  # Webhook URL printer — prints the ngrok URL after startup
  webhook-url:
    image: python:3.11-slim
    container_name: opsoracle-webhook-url
    depends_on:
      - ngrok
    environment:
      GITHUB_APP_ID: ${GITHUB_APP_ID}
    command:
      - "python"
      - "-c"
      - |
        import urllib.request, json, time, os
        print('Waiting for ngrok to start...')
        time.sleep(5)
        for attempt in range(10):
            try:
                with urllib.request.urlopen('http://ngrok:4040/api/tunnels') as r:
                    data = json.loads(r.read())
                    tunnels = data.get('tunnels', [])
                    if tunnels:
                        url = tunnels[0]['public_url']
                        webhook = url + '/webhook/github'
                        print('\n' + '='*60 + '\n  NGROK TUNNEL ACTIVE\n' + '='*60 + '\n')
                        print('  Public URL:  ' + url)
                        print('  Webhook URL: ' + webhook + '\n')
                        print('  Go to your GitHub App settings and set:')
                        print('  Webhook URL = ' + webhook + '\n')
                        print('='*60)
                        break
            except Exception as e:
                print(f'Attempt {attempt + 1} failed: {e}')
                time.sleep(3)
    profiles:
      - tools

  # CLI service
  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opsoracle-cli
    volumes:
      - .:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      OPSORACLE_SERVER: http://backend:8000
    entrypoint: [ "python", "cli.py" ]
    profiles:
      - cli
    depends_on:
      - backend
