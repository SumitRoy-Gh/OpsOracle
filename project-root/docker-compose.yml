version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pr-sentinel-backend
    ports:
      - "8000:8000"
    volumes:
      # Live reload — any code change reflects immediately
      - .:/app
      # Persist data across container restarts
      - ./data:/app/data
      # GitHub App private key mounted read-only
      - ./private-key.pem:/app/private-key.pem:ro
    env_file:
      - .env
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s